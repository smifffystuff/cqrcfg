services:
  # Mock OIDC server for local development
  mock-oidc:
    build:
      context: ./mock-oidc
      dockerfile: Dockerfile
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8888/.well-known/jwks.json').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  cqrcfg:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - STORAGE_TYPE=mongodb
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DATABASE=cqrcfg
      - NOTIFICATIONS_TYPE=websocket
      # Use mock OIDC by default, override with env vars for real OIDC
      - OIDC_JWKS_URIS=${OIDC_JWKS_URIS:-http://mock-oidc:8888/.well-known/jwks.json}
      - OIDC_ISSUERS=${OIDC_ISSUERS:-}
      - OIDC_AUDIENCE=${OIDC_AUDIENCE:-}
      - OIDC_CLAIMS_HEADERS=${OIDC_CLAIMS_HEADERS:-}
    depends_on:
      mongodb:
        condition: service_healthy
      mock-oidc:
        condition: service_healthy
    restart: unless-stopped

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      - UI_ENV=${UI_ENV:-}
      - UI_API_URL=${UI_API_URL:-/api}
      - UI_AUTH_HEADER=${UI_AUTH_HEADER:-}
      - UI_AUTH_PATTERN=${UI_AUTH_PATTERN:-}
      - UI_NAME_CLAIM=${UI_NAME_CLAIM:-sub}
      - UI_USERNAME_CLAIM=${UI_USERNAME_CLAIM:-sub}
      - UI_BASE_PATH=${UI_BASE_PATH:-/}
      - UI_ACL_CLAIM=${UI_ACL_CLAIM:-cqrcfg_acl}
      - UI_ACL_CACHE_TTL=${UI_ACL_CACHE_TTL:-300}
    depends_on:
      - cqrcfg

volumes:
  mongodb_data:
